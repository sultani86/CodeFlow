<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark Background -->
  <rect width="100" height="100" rx="25" fill="#050508"/>
  
  <!-- Outer Circuit Ring -->
  <rect x="20" y="20" width="60" height="60" rx="15" fill="none" stroke="#00f0ff" stroke-width="4"/>
  
  <!-- Inner Glowing Core -->
  <circle cx="50" cy="50" r="12" fill="#00f0ff"/>
  
  <!-- Circuit Connections -->
  <path d="M 50 5 L 50 20 M 50 80 L 50 95 M 5 50 L 20 50 M 80 50 L 95 50" stroke="#00f0ff" stroke-width="4"/>
  
  <!-- Diagonal Nodes -->
  <circle cx="20" cy="20" r="4" fill="#00ff66"/>
  <circle cx="80" cy="80" r="4" fill="#00ff66"/>
  <circle cx="80" cy="20" r="4" fill="#9d00ff"/>
  <circle cx="20" cy="80" r="4" fill="#9d00ff"/>
</svg>
